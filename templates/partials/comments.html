{%- if config.extra.giscus.repo and config.extra.giscus.repo_id -%}
<section id="comments">
    <h2>{{ macros_translate::translate(key="comments", default="Comments", language_strings=language_strings) }}</h2>
    <div class="giscus"></div>
    <script src="https://giscus.app/client.js" data-repo="{{ config.extra.giscus.repo }}"
        data-repo-id="{{ config.extra.giscus.repo_id }}"
        data-category="{{ config.extra.giscus.category | default(value='Announcements') }}"
        data-category-id="{{ config.extra.giscus.category_id }}"
        data-mapping="{{ config.extra.giscus.mapping | default(value='pathname') }}"
        data-strict="{{ config.extra.giscus.strict | default(value='0') }}"
        data-reactions-enabled="{{ config.extra.giscus.reactions_enabled | default(value='1') }}"
        data-emit-metadata="{{ config.extra.giscus.emit_metadata | default(value='0') }}"
        data-input-position="{{ config.extra.giscus.input_position | default(value='bottom') }}"
        data-theme="{{ config.extra.giscus.theme | default(value='preferred_color_scheme') }}"
        data-loading="{{ config.extra.giscus.loading | default(value='') }}"
        data-lang="{{ lang | default(value='en') }}" crossorigin="anonymous" async>
        </script>
    <div id="comments-wrapper">
        <noscript>
            <p>{{ macros_translate::translate(key="comments_noscript", default="Loading comments relies on JavaScript.
                Try enabling JavaScript and reloading, or visit the original post on Mastodon.",
                language_strings=language_strings) }}</p>
        </noscript>
    </div>
</section>
{%- endif -%}
