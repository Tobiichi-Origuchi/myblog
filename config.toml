theme = "ametrine"

title = "Origuchi's Blog"
base_url = "https://blog.origuchi.uk"
description = "Origuchi's Blog"
compile_sass = true
minify_html = true
build_search_index = true
author = "Origuchi"
generate_feeds = true
feed_filenames = ["atom.xml", "rss.xml"]
default_language = "en"

taxonomies = [
  { name = "tags", feed = true, paginate_by = 10 },
  { name = "categories", feed = true },
]

[markdown]
smart_punctuation = true
bottom_footnotes = true
external_links_class = "external"
github_alerts = true
lazy_async_image = true

[markdown.highlighting]
style = "class"
light_theme = "monokai-pro-light"
dark_theme = "monokai-pro"
extra_themes = [
  "themes/ametrine/giallo/themes/monokai-pro-light.json",
  "themes/ametrine/giallo/themes/monokai-pro.json",
]

[search]
index_format = "elasticlunr_json"

[languages.zh-Hans]
title = "Origuchi's Blog"
description = "Origuchi's Blog"
generate_feeds = true
feed_filenames = ["atom.xml", "rss.xml"]
taxonomies = [
  { name = "tags", feed = true, paginate_by = 10 },
  { name = "categories", feed = true },
]

[extra]
categories = [
  { name = "Archived", description = "Posts that have been archived due to their age.", color = "purple", icon = "box-arrow-down" },
  { name = "Featured", description = "Posts that are somewhat decently written.", color = "yellow", icon = "star" },
  { name = "Hot", description = "Posts that did numbers compared to others.", color = "red", icon = "fire" },
  { name = "Test", description = "Categories can be set and customized entirely from config, woo-hoo!", color = "green", icon = "feather" },
]
accent_color = ["hsl(216.35, 100%, 73.14%)", "hsl(214.47, 100%, 81.57%)"]
source_url = "https://github.com/Tobiichi-Origuchi/myblog"
issues_url = "https://github.com/Tobiichi-Origuchi/myblog/issues/new"
show_reading_time = true
copy_button = true
show_backlinks = true
date_format = "%d %B %Y"
date_format_long = "%d %B %Y, %R (%Z)"
date_locale = "en_US"
timezone = "Asia/Shanghai"
show_comments_qr = true

[extra.giscus]
repo = "Tobiichi-Origuchi/myblog"
repo_id = "R_kgDOQ7Hzqg"
category = "Announcements"
category_id = "DIC_kwDOQ7Hzqs4C7DWL"
mapping = "pathname"
strict = "0"
reactions_enabled = "1"
emit_metadata = "0"
input_position = "top"
theme = "noborder_gray"
data-loading = "lazy"

[extra.zh-Hans]
categories = [
  { name = "归档", description = "因发布时间较久而被归档的文章。", color = "purple", icon = "box-arrow-down" },
  { name = "精选", description = "写得相对不错的优质文章。", color = "yellow", icon = "star" },
  { name = "热门", description = "热度远超其他内容的文章。", color = "red", icon = "fire" },
  { name = "测试", description = "分类完全可以通过配置文件进行自定义！", color = "green", icon = "feather" },
]
date_format = "%Y年%m月%d日"
date_format_long = "%Y年%m月%d日 %R (%Z)"
date_locale = "zh_CN"

[extra.meta]
favicon = true
apple_touch_icon = true
card = true

[extra.nav]
icon = "apple-touch-icon.png"
links = [
  { url = "@/blog/_index.md", name = "Blog", icon = "newspaper" },
  { name = "Random 🦄", category = [
    { url = "https://example.org", name = "Eggman", icon = "egg" },
    { url = "https://example.org", name = "Honse", icon = "horse" },
    { url = "http://example.org", name = "Lie", icon = "cake", new = true },
    { url = "http://example.org", name = "No Icon?" },
  ] },
]

